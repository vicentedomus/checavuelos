name = "checavuelos-api"
main = "index.js"
compatibility_date = "2024-01-01"
account_id = "f657ac63c80efd60ceee8628b366e2d6"

[triggers]
crons = ["0 8 * * 2"]  # Fallback: solo corre si SERPAPI_KEY esta configurada

[vars]
ALLOWED_ORIGIN = "https://vicentedomus.github.io/checavuelos"
BUDGET_COMPRA_YA = "11000"
BUDGET_BUEN_PRECIO = "14000"
REFRESH_SECRET = "checavuelos2026"

[[kv_namespaces]]
binding = "FLIGHTS_KV"
id = "26da7a6c6ffb434ca8bad9f70d14fcbe"

# Secrets (configurar via CLI):
#   wrangler secret put INGEST_SECRET   (token compartido con n8n)
#   wrangler secret put SERPAPI_KEY      (opcional, solo para fallback)
